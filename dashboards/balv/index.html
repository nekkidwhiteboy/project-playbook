*{box-sizing:border-box;margin:0;padding:0}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
html,body{height:100%;background:#080b0f;color:#e0e8f0;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.65}
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#0c1018;border-bottom:1px solid #1a2430;padding:0 32px;display:flex;align-items:center;height:56px;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-logo{font-size:18px;font-weight:600;color:#5a9fd4;letter-spacing:.01em;margin-right:auto}
.topbar-meta{font-size:12px;color:#2a3848;letter-spacing:.15em;text-transform:uppercase;margin-right:24px}
.tabs{display:flex;height:100%;margin-left:32px}
.tab{display:flex;align-items:center;padding:0 20px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#2a3848;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:#4a6878}
.tab.active{color:#5a9fd4;border-bottom-color:#5a9fd4}
.content{flex:1;overflow-y:auto;padding:32px}
.inner{max-width:1100px;margin:0 auto}
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#0c1018;border:1px solid #1a2430;padding:20px 24px}
.stat-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#2a3848;margin-bottom:10px}
.stat-value{font-size:38px;font-weight:300;color:#e0e8f0;line-height:1}
.stat-sub{font-size:13px;color:#2a3848;margin-top:6px}
.stat-value.blue{color:#5a9fd4}
.stat-value.green{color:#5abf82}
.stat-value.red{color:#c46060}
/* Sections */
.section-header{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.section-title{font-size:20px;font-weight:500;color:#e0e8f0}
.section-sub{font-size:13px;color:#2a3848}

.phase-card{padding:14px 16px;border:1px solid #1a2430;background:#0a0e14;transition:border-color .2s}
.phase-card.complete{background:#0d1f14;border-color:#1e4030}
.phase-card.in_progress{background:#0e1620;border-color:#1e3050}
.phase-card.blocked{background:#1a0d0d;border-color:#3d1818}
.phase-card.not_started{background:#0a0e14;border-color:#1a2430}
.phase-num{font-size:11px;letter-spacing:.18em;color:#2a3848;margin-bottom:5px}
.phase-name{font-size:15px;font-weight:500;color:#e0e8f0;margin-bottom:5px}
.phase-desc{font-size:13px;color:#2a3848;line-height:1.5}
.phase-status{display:inline-block;font-size:11px;letter-spacing:.13em;text-transform:uppercase;padding:3px 10px;margin-top:10px}
.phase-card.complete .phase-status{background:#0d1f14;border:1px solid #1e4030;color:#5abf82}
.phase-card.in_progress .phase-status{background:#0e1620;border:1px solid #1e3050;color:#5a9fd4}
.phase-card.blocked .phase-status{background:#1a0d0d;border:1px solid #3d1818;color:#c46060}
.phase-card.not_started .phase-status{background:#0a0e14;border:1px solid #1a2430;color:#2a3848}

.blockers-panel{background:#140d0d;border:1px solid #3d1818;padding:20px 24px;margin-bottom:32px}
.blockers-title{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#c46060;margin-bottom:14px}
.blocker-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid #2a1010}
.blocker-item:last-child{border-bottom:none}
.blocker-decision{font-size:15px;font-weight:500;color:#e0e8f0;flex:1}
.blocker-blocks{font-size:13px;color:#3a2828;margin-top:3px}
/* Decisions */
.decisions-list{display:flex;flex-direction:column;gap:16px}
.decision-card{background:#0c1018;border:1px solid #1a2430;padding:24px}
.decision-card.resolved{opacity:.65;border-color:#1e4030}
.decision-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.decision-tier{font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:3px 10px;flex-shrink:0;margin-top:2px}
.tier-1{background:#140d0d;border:1px solid #3d1818;color:#c46060}
.tier-2{background:#0e1620;border:1px solid #1e3050;color:#5a9fd4}
.decision-title{font-size:18px;font-weight:500;color:#e0e8f0;flex:1}
.decision-desc{font-size:14px;color:#4a6878;line-height:1.75;margin-bottom:14px}
.decision-options{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.decision-option{font-size:13px;color:#4a6878;padding:9px 13px;background:#080b0f;border-left:2px solid #1a2430}
.decision-blocks{font-size:12px;color:#2a3848;margin-bottom:16px}
.decision-blocks span{display:inline-block;background:#080b0f;border:1px solid #1a2430;padding:2px 8px;margin-right:6px;margin-bottom:4px}
.resolve-btn{background:#5a9fd4;color:#080b0f;border:none;padding:9px 22px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:opacity .2s}
.resolve-btn:hover{opacity:.85}
.resolved-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:#5abf82}
.resolved-note{font-size:14px;color:#4a7858;font-style:italic;margin-top:10px;padding:12px 16px;background:#0d1f14;border-left:2px solid #1e4030}
.resolve-form{margin-top:16px;padding:18px;background:#080b0f;border:1px solid #1a2430}
.form-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#5a9fd4;margin-bottom:8px;display:block}
.form-input{width:100%;background:#0c1018;border:1px solid #1a2430;color:#e0e8f0;padding:11px 13px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;transition:border-color .2s}
.form-input:focus{border-color:#5a9fd444}
.form-textarea{width:100%;background:#0c1018;border:1px solid #1a2430;color:#e0e8f0;padding:11px 13px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;resize:vertical;min-height:90px;transition:border-color .2s}
.form-textarea:focus{border-color:#5a9fd444}
.form-row{display:flex;gap:10px}
.form-submit{background:#5a9fd4;color:#080b0f;border:none;padding:10px 24px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer}

.chat-wrap{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:#1a2430 transparent}
.bubble-ai{max-width:88%;padding:14px 18px;font-size:15px;line-height:1.78;font-family:'DM Sans',sans-serif;align-self:flex-start;background:#080b0f;border:1px solid #1a2430;color:#d0d8e8;white-space:pre-wrap;animation:fadeUp .3s ease}

.send-row{display:flex;gap:10px;border-top:1px solid #1a2430;padding-top:16px;flex-shrink:0}
.send-input{flex:1;background:#080b0f;border:1px solid #1a2430;color:#e0e8f0;padding:12px 15px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none}

const sb = supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.key);

async function dbLoadDecisions() {
  const { data, error } = await sb.from("mha_decisions").select("*").eq("project_name", CONFIG.project.name);
  if (error) throw error;
  return data || [];
}

async function dbSeedDecisions() {
  const rows = CONFIG.decisions.map(d => ({
    id: d.id, project_name: CONFIG.project.name, status: "open",
    resolution: null, resolved_by: null, resolved_at: null,
  }));
  const { error } = await sb.from("mha_decisions").upsert(rows, { onConflict: "id", ignoreDuplicates: true });
  if (error) throw error;
}

async function dbResolveDecision(id, resolvedBy, resolution) {
  const { error } = await sb.from("mha_decisions")
    .update({ status: "resolved", resolution, resolved_by: resolvedBy, resolved_at: new Date().toISOString() })
    .eq("id", id);
  if (error) throw error;
}

async function dbGetCompletedInterviews() {
  const { data, error } = await sb.from("mha_interviews").select("name");
  if (error) return [];
  return [...new Set((data || []).map(r => r.name))];
}

  const [interviews, setInterviews]     = useState([]);
  const [loading, setLoading]           = useState(true);
  const [dbError, setDbError]           = useState("");

  useEffect(() => { init(); }, []);

  async function init() {
    setLoading(true);
    try {
      await dbSeedDecisions();
      const rows = await dbLoadDecisions();
      const map = {};
      rows.forEach(r => { map[r.id] = r; });
      setDecisions(map);
      const names = await dbGetCompletedInterviews();
      setInterviews(names);
    } catch(e) {
      setDbError("Database connection failed. Check Supabase configuration.");
    }
    setLoading(false);
  }

  async function resolveDecision(id, resolvedBy, resolution) {
    await dbResolveDecision(id, resolvedBy, resolution);
    setDecisions(prev => ({ ...prev, [id]: { ...prev[id], status: "resolved", resolution, resolved_by: resolvedBy } }));
  }

  const completedPhases  = CONFIG.phases.filter(p => p.status === "complete").length;
  const inProgressPhases = CONFIG.phases.filter(p => p.status === "in_progress").length;
  const openDecisions    = CONFIG.decisions.filter(d => !decisions[d.id] || decisions[d.id]?.status === "open").length;

  const TABS = [
    { id:"overview",  label:"Overview"  },
    { id:"decisions", label:`Decisions${openDecisions > 0 ? ` (${openDecisions})` : ""}` },
    { id:"documents", label:"Documents" },
  ];

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-logo">{CONFIG.project.name}</div>
        <div className="topbar-meta">v{CONFIG.project.version}</div>
        <div className="tabs">
          {TABS.map(t => (
            <div key={t.id} className={`tab${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>{t.label}</div>
          ))}
        </div>
      </div>
      <div className="content">
        <div className="inner">
          {dbError && <div className="error-notice">{dbError}</div>}
          {loading && <div className="notice">Connecting to database…</div>}
          {!loading && tab==="overview" && <OverviewTab decisions={decisions} interviews={interviews} completedPhases={completedPhases} inProgressPhases={inProgressPhases} openDecisions={openDecisions}/>}
          {!loading && tab==="decisions" && <DecisionsTab decisions={decisions} onResolve={resolveDecision}/>}
          {tab==="documents" && <DocumentsTab/>}
        </div>
      </div>
    </div>
  );
}

function OverviewTab({ decisions, interviews, completedPhases, inProgressPhases, openDecisions }) {
  const openDecisionsList = CONFIG.decisions.filter(d => !decisions[d.id] || decisions[d.id]?.status === "open");
  return (
    <div className="fade-in">
      <div className="stats-row">
        <div className="stat-card"><div className="stat-label">Phases Complete</div><div className={`stat-value${completedPhases>0?" green":""}`}>{completedPhases}</div><div className="stat-sub">of {CONFIG.phases.length} total</div></div>
        <div className="stat-card"><div className="stat-label">In Progress</div><div className={`stat-value${inProgressPhases>0?" blue":""}`}>{inProgressPhases}</div><div className="stat-sub">phases active</div></div>
        <div className="stat-card"><div className="stat-label">Open Decisions</div><div className={`stat-value${openDecisions>0?" red":" green"}`}>{openDecisions}</div><div className="stat-sub">{openDecisions>0?"blocking progress":"all resolved"}</div></div>
        <div className="stat-card"><div className="stat-label">Interviews Done</div><div className="stat-value blue">{interviews.length}</div><div className="stat-sub">discovery sessions</div></div>
      </div>

      {openDecisionsList.length > 0 && (
        <div style={{marginBottom:"32px"}}>
          <div className="section-header"><div className="section-title">Blocking Decisions</div><div className="section-sub">Resolve these before build can continue</div></div>
          <div className="blockers-panel">
            <div className="blockers-title">⚠ Open decisions blocking progress</div>
            {openDecisionsList.map(d=>(
              <div key={d.id} className="blocker-item">
                <div style={{flex:1}}>
                  <div className="blocker-decision">{d.title}</div>
                  <div className="blocker-blocks">Blocks: {d.blocks.join(" · ")}</div>
                </div>
                <div style={{fontSize:"11px",color:d.tier===1?"#c46060":"#5a9fd4",letterSpacing:".15em",textTransform:"uppercase",flexShrink:0}}>{d.tier===1?"Priority":"Important"}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{marginBottom:"16px"}}><div className="section-header"><div className="section-title">Playbook Phases</div><div className="section-sub">15-phase build process</div></div></div>
      <div className="phase-grid">
        {CONFIG.phases.map(p=>(
          <div key={p.id} className={`phase-card ${p.status}`}>
            <div className="phase-num">Phase {p.n}</div>
            <div className="phase-name">{p.name}</div>
            <div className="phase-desc">{p.desc}</div>
            <div className="phase-status">
              {p.status==="complete"?"✓ Complete":p.status==="in_progress"?"● In Progress":p.status==="blocked"?"⚠ Blocked":"○ Not Started"}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DecisionsTab({ decisions, onResolve }) {
  const tier1 = CONFIG.decisions.filter(d=>d.tier===1);
  const tier2 = CONFIG.decisions.filter(d=>d.tier===2);
  return (
    <div className="fade-in">
      <div style={{marginBottom:"24px"}}>
        <div className="section-header"><div className="section-title">Decision Queue</div><div className="section-sub">Resolve Tier 1 first — they unblock everything else</div></div>
        <p style={{fontSize:"14px",color:"#2a3848",lineHeight:"1.75",maxWidth:"620px"}}>These decisions must be resolved before development can proceed. Anyone can mark a decision resolved. Resolutions are saved to the shared database.</p>
      </div>
      <div style={{marginBottom:"8px",fontSize:"11px",letterSpacing:".22em",textTransform:"uppercase",color:"#c46060"}}>Tier 1 — Non-Negotiable</div>
      <div className="decisions-list" style={{marginBottom:"32px"}}>{tier1.map(d=><DecisionCard key={d.id} decision={d} dbState={decisions[d.id]} onResolve={onResolve}/>)}</div>
      <div style={{marginBottom:"8px",fontSize:"11px",letterSpacing:".22em",textTransform:"uppercase",color:"#5a9fd4"}}>Tier 2 — Important</div>
      <div className="decisions-list">{tier2.map(d=><DecisionCard key={d.id} decision={d} dbState={decisions[d.id]} onResolve={onResolve}/>)}</div>
    </div>
  );
}

function DecisionCard({ decision, dbState, onResolve }) {
  const [showForm, setShowForm] = useState(false);
  const [resolvedBy, setResolvedBy] = useState("");
  const [resolution, setResolution] = useState("");
  const [saving, setSaving] = useState(false);
  const isResolved = dbState?.status === "resolved";

  async function handleResolve() {
    if (!resolvedBy.trim() || !resolution.trim()) return;
    setSaving(true);
    await onResolve(decision.id, resolvedBy.trim(), resolution.trim());
    setSaving(false);
    setShowForm(false);
  }

  return (
    <div className={`decision-card${isResolved?" resolved":""}`}>
      <div className="decision-header">
        <div className={`decision-tier ${decision.tier===1?"tier-1":"tier-2"}`}>{decision.tier===1?"Priority":"Important"}</div>
        <div className="decision-title">{decision.title}</div>
      </div>
      <div className="decision-desc">{decision.desc}</div>
      <div className="decision-options">{decision.options.map((o,i)=><div key={i} className="decision-option">{o}</div>)}</div>
      <div className="decision-blocks"><span style={{marginRight:"8px",color:"#2a3848"}}>Blocks:</span>{decision.blocks.map(b=><span key={b}>{b}</span>)}</div>
      {isResolved ? (
        <div>
          <div className="resolved-badge"><span>✓</span><span>Resolved by {dbState.resolved_by}</span></div>
          <div className="resolved-note">{dbState.resolution}</div>
        </div>
      ) : (
        <div>
          <div style={{display:"flex",gap:"10px"}}>
            <button className="resolve-btn" onClick={()=>setShowForm(!showForm)}>{showForm?"Cancel":"Mark as Resolved"}</button>
          </div>
          {showForm && (
            <div className="resolve-form">
              <label className="form-label">Your name</label>
              <input className="form-input" placeholder="First name" value={resolvedBy} onChange={e=>setResolvedBy(e.target.value)}/>
              <label className="form-label">What was decided?</label>
              <textarea className="form-textarea" placeholder="Describe the decision reached..." value={resolution} onChange={e=>setResolution(e.target.value)}/>
              <div className="form-row">
                <button className="form-submit" onClick={handleResolve} disabled={saving||!resolvedBy.trim()||!resolution.trim()}>{saving?"Saving…":"Save Resolution"}</button>
                <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function DocumentsTab() {
  return (
    <div className="fade-in">
      <div style={{marginBottom:"24px"}}>
        <div className="section-header"><div className="section-title">Project Documents</div><div className="section-sub">Planning and reference files</div></div>
        <p style={{fontSize:"14px",color:"#2a3848",lineHeight:"1.7",maxWidth:"560px"}}>Update document URLs in the CONFIG object as documents are created and hosted.</p>
      </div>
      <div className="docs-grid">
        {CONFIG.documents.map(d=>(
          <div key={d.name} className="doc-card">
            <div className="doc-name">{d.name}</div>
            <div className="doc-desc">{d.desc}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div className={`doc-status ${d.status}`}>{d.status==="complete"?"✓ Complete":d.status==="in_progress"?"● In Progress":"○ Not Started"}</div>
              {d.url!=="#"?<a className="doc-link" href={d.url} target="_blank" rel="noopener">Open →</a>:<span style={{fontSize:"11px",color:"#1a2430"}}>URL not set</span>}
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:"32px",padding:"20px 24px",background:"#0c1018",border:"1px solid #1a2430"}}>
        <div style={{fontSize:"11px",letterSpacing:".22em",textTransform:"uppercase",color:"#5a9fd4",marginBottom:"10px"}}>To update document links</div>
        <p style={{fontSize:"13px",color:"#2a3848",lineHeight:"1.8"}}>Edit the <code style={{background:"#080b0f",padding:"1px 6px",color:"#5a9fd4"}}>documents</code> array in the CONFIG object at the top of this HTML file. Replace <code style={{background:"#080b0f",padding:"1px 6px",color:"#5a9fd4"}}>"#"</code> with the actual URL for each document.</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
